      content="تم إرسال بياناتك بنجاح إلى YallaStudy. سنتواصل معك قريباً."
    />
    <meta name="robots" content="noindex,follow" />
    <meta name="theme-color" content="#0b52c1" />
    <link rel="canonical" href="https://www.yallastudy.sa/thank-you.html" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Changa:wght@600;700&display=swap"

    />

    <link rel="stylesheet" href="styles.min.css" />
    <link rel="stylesheet" href="ui-fixes.css" />
    <!-- Google Ads conversion tag placeholder -->
    <style>
      .thank-you-body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .thank-you-shell {
        width: min(100%, 640px);
      }

      .thank-you-card {
        text-align: center;
        gap: var(--space-4);
        padding: clamp(28px, 5vw, 44px);
      }

      .thank-you-card p {
        margin: 0;
        font-size: 1.05rem;
      }

      .thank-you-card .btn {
        width: 100%;
      }

      @media (min-width: 640px) {
        .thank-you-card .btn {
          width: auto;
          min-width: 240px;
        }
      }
    </style>
  </head>
  <body class="thank-you-body">
    <main class="thank-you-shell">
      <section class="contact-card thank-you-card">
        <h1>شكراً!</h1>
        <p>تم إرسال بياناتك بنجاح. سنتواصل معك قريباً.</p>
        <a class="btn btn-primary-dark" href="https://www.yallastudy.sa/">العودة للصفحة الرئيسية</a>
      </section>
    </main>
  </body>
